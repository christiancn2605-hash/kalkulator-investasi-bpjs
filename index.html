<!DOCTYPE html>
<html>

<head>
    <title>Kalkulator Investasi BPJS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>

<body>

    <div class="container">

        <h1>Kalkulator Investasi BPJS</h1>

        <label>Nama</label>
        <input id="name" placeholder="Masukkan nama Anda">

        <label>Tanggal Lahir</label>
        <input type="text" id="birthDate" placeholder="DD/MM/YYYY" maxlength="10">

        <label>Jenis Kelamin</label>
        <select id="gender">
    <option value="" selected disabled>
        Pilih Jenis Kelamin
    </option>
    <option value="Pria">Pria</option>
    <option value="Wanita">Wanita</option>
    </select>

        <label>Kelas BPJS</label>
        <select id="bpjsClass">
    <option value="" selected disabled>
        Pilih Kelas BPJS
    </option>
    <option value="Kelas 1">Kelas 1</option>
    <option value="Kelas 2">Kelas 2</option>
    <option value="Kelas 3">Kelas 3</option>
    </select>

        <label>Usia Pensiun</label>
        <input type="number" id="retirementAge" placeholder="e.g. 60" min="0">

        <label>Usia Akhir Investasi</label>
        <input type="number" id="savingAge" placeholder="e.g. 45" min="0">

        <label>Tingkat Suku Bunga (%)</label>
        <input type="number" id="interest" min="0" step="0.01" placeholder="e.g. 3.5">

        <button onclick="calculate()">
            Calculate
        </button>
        </div>

        <div id="result-card" class="result-card">
            <h2>Investment Summary</h2>

            <p id="result-name">
    Ready to calculate
</p>

<div id="result">
    Enter your information and click Calculate.
</div>

        
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
flatpickr("#birthDate", {
    dateFormat: "d-m-Y",
    allowInput: true
});
</script>
</body>

</html>
